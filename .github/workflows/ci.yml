name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v --tb=short

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: src/agent_os/dashboard/frontend
        run: npm ci

      - name: TypeScript check
        working-directory: src/agent_os/dashboard/frontend
        run: npx tsc -b

      - name: Build
        working-directory: src/agent_os/dashboard/frontend
        run: npm run build

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build frontend for wheel bundling
        working-directory: src/agent_os/dashboard/frontend
        run: |
          npm ci
          npm run build

      - name: Install build tools
        run: pip install build

      - name: Build wheel (direct from source, not via sdist)
        run: python -m build --wheel

      - name: Verify wheel contains bundled frontend
        run: |
          unzip -l dist/*.whl | grep -q 'agent_os/dashboard/_frontend/index.html' || { echo 'ERROR: wheel does not contain bundled frontend'; exit 1; }
          echo 'wheel contains bundled frontend'

      - name: Verify wheel installs and CLI works
        run: |
          pip install "$(ls dist/*.whl)[dashboard]"
          agent-os --help

      - name: Publish wheel to 'latest' release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WHEEL=$(ls dist/*.whl)
          # Create or update the 'latest' release, overwriting the previous wheel
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest "$WHEEL" \
            --title "Latest build from main" \
            --notes "Auto-published by CI on merge to main. Commit: ${{ github.sha }}" \
            --prerelease
